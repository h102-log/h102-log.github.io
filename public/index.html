<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 데이터 수집 및 API 분석 연습장</title>
    <style>
        /* [Design] 명명 규칙(kebab-case) 준수 */
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
            color: #0056b3;
            border-left: 4px solid #0056b3;
            padding-left: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #f4f4f4;
        }

        .hidden-box {
            margin-top: 15px;
            padding: 15px;
            border: 2px dashed #dc3545;
            background-color: #fff0f0;
            display: none;
            font-weight: bold;
            color: #dc3545;
        }

        button {
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

    <h1>웹 데이터 수집(Scraping & API) 연습장</h1>

    <h2>1. 동적 렌더링 테이블 (API Fetch)</h2>
    <p>페이지 로딩 시 백그라운드에서 API를 호출하여 데이터를 채웁니다.<br>
        <span style="color:red; font-size:14px;">(Tip: Jsoup으로 긁으면 '데이터를 불러오는 중입니다...' 만 나옵니다!)</span>
    </p>

    <table id="user-table">
        <thead>
            <tr>
                <th>직원 ID</th>
                <th>이름</th>
                <th>이메일</th>
                <th>소속사</th>
            </tr>
        </thead>
        <tbody id="user-tbody">
            <tr>
                <td colspan="4" style="color: gray;">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>

    <h2>2. 클릭 이벤트 기반 시크릿 데이터</h2>
    <p>버튼을 클릭해야만 JavaScript가 동작하여 데이터를 노출합니다. (Playwright 제어 연습용)</p>

    <button id="activate-btn">시크릿 쿠폰 발급 (Click)</button>
    <div id="revealed-content" class="hidden-box">
        쿠폰 코드: <span id="coupon-code"></span>
    </div>

    <script>
        // ==========================================
        // [Logic] 최신 ES6+ 모던 자바스크립트 적용
        // ==========================================

        // 1. 페이지 로드 시 표를 채우는 비동기 함수
        const fetchTableData = async () => {
            const tbody = document.getElementById('user-tbody');
            const targetApiUrl = 'https://jsonplaceholder.typicode.com/users';

            try {
                // Fetch API와 await로 깔끔한 데이터 요청
                const response = await fetch(targetApiUrl);

                // [주의사항] 방어적 코딩: HTTP 응답 코드 검증
                if (!response.ok) {
                    throw new Error(`네트워크 응답 에러. 상태 코드: ${response.status}`);
                }

                // 응답 데이터를 순수 JSON 배열로 파싱
                const userList = await response.json();

                // 테이블 내부를 비워줍니다.
                tbody.innerHTML = '';

                // 배열의 map()과 템플릿 리터럴(`)을 활용한 우아한 렌더링
                // 의도: 너무 많으면 보기 안 좋으니 상위 5명(slice)만 추출합니다.
                const rowsHtml = userList.slice(0, 5).map(user => {
                    // 객체 구조 분해 할당
                    const { id, name, email, company } = user;

                    return `
                        <tr>
                            <td>${id}</td>
                            <td style="font-weight: bold; color: #0056b3;">${name}</td>
                            <td>${email}</td>
                            <td>${company.name}</td>
                        </tr>
                    `;
                }).join(''); // 배열을 하나의 HTML 문자열로 합침

                // DOM에 실제 데이터 삽입
                tbody.innerHTML = rowsHtml;

            } catch (error) {
                // 예외 발생 시 테이블에 에러 문구 출력
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="color:red; font-weight:bold;">
                            [에러] 통신 중 문제가 발생했습니다: ${error.message}
                        </td>
                    </tr>
                `;
            }
        };

        // DOM이 모두 로드되면 즉시 API 호출 함수를 실행합니다.
        document.addEventListener('DOMContentLoaded', fetchTableData);

        // ------------------------------------------

        // 2. 버튼 클릭 시 쿠폰 번호 노출 로직
        document.getElementById('activate-btn').addEventListener('click', () => {
            const contentDiv = document.getElementById('revealed-content');
            const codeSpan = document.getElementById('coupon-code');

            contentDiv.style.display = 'block';
            codeSpan.innerText = '로딩 중...';

            setTimeout(() => {
                codeSpan.innerText = 'SCRAPE-MASTER-2024';
            }, 500);
        });
    </script>
</body>

</html>
