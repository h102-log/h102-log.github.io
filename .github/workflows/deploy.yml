name: Deploy Next.js site to GitHub Pages

on:
  # [비즈니스 로직 의도]: 'main' 브랜치에 코드가 푸시될 때만 이 자동화 작업이 실행되도록 합니다.
  # 불필요한 브랜치 작업 시에는 빌드 리소스를 낭비하지 않기 위함입니다.
  push:
    branches: ["main"]
  # [의도]: GitHub 웹페이지(Actions 탭)에서 버튼을 눌러 수동으로 배포하고 싶을 때를 대비한 설정입니다.
  workflow_dispatch:

# [의도]: GitHub Actions 봇이 GitHub Pages에 파일을 쓸 수 있도록 권한을 부여합니다.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # [의도]: 의존성 설치 속도를 높이기 위해 npm 캐시를 활성화합니다.
          cache: 'npm'

      - name: Install dependencies
        # [주의사항/Edge Case]: 실무에서는 패키지 버전 충돌을 막기 위해 npm install 대신 npm ci를 권장합니다.
        # package-lock.json 파일을 기준으로 완벽하게 동일한 환경을 구성해 줍니다.
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # [의도]: Next.js에서 'output: export'를 설정하면 'out' 폴더에 정적 파일이 생성됩니다.
          # 이 폴더를 통째로 묶어서(artifact) 배포 단계로 넘깁니다.
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4